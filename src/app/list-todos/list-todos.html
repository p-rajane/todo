<h1>Todo List</h1>
<div class="">
<table class="table table-striped table-hover">
    <thead>
        <th>Id</th>
        <th>Description</th>
        <th>isDone?</th>
        <th>Date</th>
    </thead>
    <tbody>
        @for (todo of todos; track todo.id) {
        <tr>
            <td>{{todo.id}}</td>
            <td>{{todo.description}}</td>
            <td>{{todo.done}}</td>
            <td>{{todo.targetDate | date}}</td>
        </tr>
        }

    </tbody>
</table>
</div>
